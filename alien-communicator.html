<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koi Mil Gaya — Alien Communicator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #03050f;
    --surface: #080d1e;
    --surface2: #0d1530;
    --accent: #4af7ff;
    --accent2: #7b5fff;
    --accent3: #ff6b6b;
    --text: #c8e8ff;
    --muted: #3a5a7a;
    --glow: rgba(74, 247, 255, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Starfield */
  .stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 1; }
  }

  /* Scanning line */
  .scan-line {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.15;
    animation: scan 6s linear infinite;
    z-index: 1; pointer-events: none;
  }
  @keyframes scan { from { top: -2px; } to { top: 100vh; } }

  .container {
    position: relative; z-index: 2;
    width: 100%; max-width: 600px;
    padding: 30px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }

  /* Header */
  .header { text-align: center; }
  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
    letter-spacing: 4px;
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
  }
  .header p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Jadoo face */
  .jadoo-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .jadoo {
    width: 80px; height: 80px;
    position: relative;
  }
  .jadoo-head {
    width: 60px; height: 70px;
    border-radius: 50% 50% 45% 45%;
    background: radial-gradient(ellipse at 40% 35%, #1a3a5c, #0a1a2e);
    border: 1.5px solid var(--accent);
    box-shadow: 0 0 20px var(--glow), inset 0 0 15px rgba(74,247,255,0.1);
    position: absolute; left: 10px; top: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px;
  }
  .jadoo-eye {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: blink 3s infinite;
  }
  .jadoo-eyes { display: flex; gap: 10px; }
  @keyframes blink {
    0%,94%,100% { transform: scaleY(1); }
    96% { transform: scaleY(0.05); }
  }
  .jadoo-mouth {
    width: 18px; height: 6px; border-radius: 0 0 10px 10px;
    border: 1.5px solid var(--accent);
    border-top: none;
    transition: all 0.3s;
  }
  .jadoo-glow-ring {
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
    animation: ring-pulse 2s infinite;
  }
  @keyframes ring-pulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .jadoo-status {
    font-size: 11px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase;
    min-height: 16px;
  }

  /* Waveform */
  .waveform {
    display: flex; align-items: center; gap: 3px;
    height: 50px; padding: 0 10px;
    background: var(--surface);
    border: 1px solid var(--muted);
    border-radius: 8px;
    width: 100%;
  }
  .wbar {
    flex: 1; border-radius: 2px;
    background: var(--muted);
    transition: height 0.08s ease, background 0.2s;
    min-height: 3px;
  }
  .wbar.active { background: var(--accent); box-shadow: 0 0 6px var(--glow); }

  /* Frequency display */
  .freq-display {
    background: var(--surface);
    border: 1px solid var(--muted);
    border-radius: 8px;
    padding: 12px 20px;
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
  }
  .freq-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; }
  .freq-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 10px var(--glow);
    transition: all 0.2s;
  }
  .freq-note { font-size: 11px; color: var(--accent2); letter-spacing: 2px; }

  /* Tone buttons */
  .tone-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }
  @media (max-width: 360px) {
    .tone-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .tone-btn {
    background: var(--surface);
    border: 1px solid var(--muted);
    border-radius: 10px;
    padding: 16px 6px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    transition: all 0.15s;
    position: relative; overflow: hidden;
    min-width: 0;
  }
  .tone-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .tone-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .tone-btn:active { transform: scale(0.96); }
  .tone-btn.playing {
    border-color: var(--accent);
    background: var(--surface2);
    box-shadow: 0 0 20px var(--glow), inset 0 0 15px rgba(74,247,255,0.08);
  }
  .tone-btn.playing::before { opacity: 0.05; }
  .tone-dot { width: 10px; height: 10px; border-radius: 50%; }
  .tone-name {
    font-size: clamp(9px, 2.5vw, 13px);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-weight: 400;
    text-align: center;
    word-break: break-word;
    line-height: 1.3;
  }
  .tone-hz { font-size: 10px; color: var(--muted); }

  /* Ripple effect */
  .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(74,247,255,0.3);
    transform: scale(0);
    animation: ripple-anim 0.6s linear;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Sequence controls */
  .seq-panel {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--muted);
    border-radius: 10px;
    padding: 16px;
  }
  .seq-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .seq-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (max-width: 400px) {
    .seq-btns { grid-template-columns: 1fr 1fr; }
  }
  .seq-btn {
    padding: 12px 10px;
    border-radius: 8px;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 2.5vw, 12px);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    text-align: center;
  }
  .seq-btn:hover { border-color: var(--accent); color: var(--accent); }
  .seq-btn.stop:hover { border-color: var(--accent3); color: var(--accent3); }
  .seq-btn:active { transform: scale(0.97); }

  /* Status */
  .status-bar {
    width: 100%;
    border: 1px solid var(--muted);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    min-height: 40px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
    animation: pulse-dot 1.5s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  .status-dot.idle { background: var(--muted); box-shadow: none; animation: none; }

  /* Transmission progress */
  .progress-wrap {
    width: 100%;
    height: 2px;
    background: var(--surface2);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--glow);
    width: 0%;
    transition: width 0.4s ease;
  }

  /* Footer */
  .footer {
    font-size: 10px; color: var(--muted);
    letter-spacing: 2px; text-align: center;
    padding-bottom: 20px;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="scan-line"></div>

<div class="container">

  <div class="header">
    <h1>KOI MIL GAYA</h1>
    <p>Alien Frequency Communicator — Est. 2003</p>
  </div>

  <div class="jadoo-wrap">
    <div class="jadoo">
      <div class="jadoo-glow-ring"></div>
      <div class="jadoo-head">
        <div class="jadoo-eyes">
          <div class="jadoo-eye" id="eyeL"></div>
          <div class="jadoo-eye" id="eyeR"></div>
        </div>
        <div class="jadoo-mouth" id="mouth"></div>
      </div>
    </div>
    <div class="jadoo-status" id="jadooStatus">STANDBY</div>
  </div>

  <div class="waveform" id="waveform"></div>

  <div class="freq-display">
    <div>
      <div class="freq-label">FREQUENCY</div>
      <div class="freq-value" id="freqVal">— — —</div>
    </div>
    <div style="text-align:right">
      <div class="freq-label">NOTE</div>
      <div class="freq-note" id="freqNote">IDLE</div>
    </div>
  </div>

  <div class="tone-grid" id="toneGrid"></div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="seq-panel">
    <div class="seq-label">Transmission Sequences</div>
    <div class="seq-btns">
      <button class="seq-btn" onclick="playSeq('movie')">▶ Movie Sequence</button>
      <button class="seq-btn" onclick="playSeq('alien')">▶ Alien Response</button>
      <button class="seq-btn" onclick="playSeq('sos')">▶ SOS Signal</button>
      <button class="seq-btn stop" onclick="stopAll()">■ Stop</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot idle" id="statusDot"></div>
    <span id="statusText">SYSTEM READY — AWAITING TRANSMISSION</span>
  </div>

  <div class="footer">PRESS ANY BUTTON TO TRANSMIT · USE HEADPHONES FOR BEST EXPERIENCE</div>
</div>

<script>
const tones = [
  { label: 'Bhanu',       freq: 261.6, color: '#4af7ff' },
  { label: 'Bhondu',      freq: 293.7, color: '#7b5fff' },
  { label: 'Bhoomika',    freq: 329.6, color: '#ff9f43' },
  { label: 'Bhoomi',      freq: 349.2, color: '#ff6b6b' },
  { label: 'Sar Ka Dard', freq: 392.0, color: '#a29bfe' },
  { label: 'Muskaan',     freq: 440.0, color: '#55efc4' },
  { label: 'Bhanu+',      freq: 493.9, color: '#fd79a8' },
  { label: 'Bhoomi+',     freq: 523.3, color: '#4af7ff' },
  { label: 'Mrs Palour',  freq: 174.6, color: '#74b9ff' },
];

const sequences = {
  movie: [4, 2, 0, 2, 4, 6, 4, 2, 0],
  alien: [8, 6, 4, 2, 0, 2, 4, 6, 8, 4],
  sos:   [0, 0, 0, 4, 4, 4, 0, 0, 0],
};

let ctx = null;
let waveInterval = null;
let stopped = false;
const BARS = 20;

function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  return ctx;
}

function playTone(freq, duration = 0.45) {
  const c = getCtx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.connect(gain); gain.connect(c.destination);
  osc.type = 'sine';
  osc.frequency.value = freq;
  const t = c.currentTime;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.45, t + 0.025);
  gain.gain.linearRampToValueAtTime(0, t + duration - 0.025);
  osc.start(t); osc.stop(t + duration);
}

function buildWaveform() {
  const wf = document.getElementById('waveform');
  for (let i = 0; i < BARS; i++) {
    const b = document.createElement('div');
    b.className = 'wbar';
    b.style.height = (Math.random() * 10 + 3) + 'px';
    wf.appendChild(b);
  }
}

function animateWave(active) {
  clearInterval(waveInterval);
  const bars = document.querySelectorAll('.wbar');
  if (!active) {
    bars.forEach(b => {
      b.classList.remove('active');
      b.style.height = (Math.random() * 8 + 3) + 'px';
    });
    return;
  }
  waveInterval = setInterval(() => {
    bars.forEach(b => {
      b.classList.add('active');
      b.style.height = (Math.random() * 38 + 5) + 'px';
    });
  }, 80);
}

function setStatus(text, active = true) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (active ? '' : ' idle');
}

function setFreq(tone) {
  if (!tone) {
    document.getElementById('freqVal').textContent = '— — —';
    document.getElementById('freqNote').textContent = 'IDLE';
    return;
  }
  document.getElementById('freqVal').textContent = tone.freq.toFixed(1) + ' Hz';
  document.getElementById('freqNote').textContent = tone.label;
}

function setJadoo(state) {
  const status = document.getElementById('jadooStatus');
  const mouth = document.getElementById('mouth');
  if (state === 'active') {
    status.textContent = 'RECEIVING SIGNAL';
    mouth.style.width = '22px';
    mouth.style.borderRadius = '0 0 12px 12px';
  } else if (state === 'happy') {
    status.textContent = 'JADOO IS HAPPY!';
    mouth.style.width = '26px';
  } else {
    status.textContent = 'STANDBY';
    mouth.style.width = '18px';
    mouth.style.borderRadius = '0 0 10px 10px';
  }
}

function addRipple(btn, e) {
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function handleBtn(i, e) {
  const btns = document.querySelectorAll('.tone-btn');
  btns[i].classList.add('playing');
  addRipple(btns[i], e);
  animateWave(true);
  setFreq(tones[i]);
  setJadoo('active');
  playTone(tones[i].freq, 0.6);
  setStatus('TRANSMITTING ' + tones[i].label + ' AT ' + tones[i].freq.toFixed(1) + ' Hz');
  setTimeout(() => {
    btns[i].classList.remove('playing');
    animateWave(false);
    setFreq(null);
    setJadoo('idle');
    setStatus('TRANSMISSION COMPLETE', false);
  }, 700);
}

async function playSeq(type) {
  stopped = false;
  const seq = sequences[type];
  const labels = { movie: 'MOVIE SEQUENCE', alien: 'ALIEN RESPONSE', sos: 'SOS SIGNAL' };
  const label = labels[type];
  setStatus('INITIATING ' + label + '...');
  setJadoo('active');
  animateWave(true);
  const btns = document.querySelectorAll('.tone-btn');
  const prog = document.getElementById('progressBar');

  for (let i = 0; i < seq.length; i++) {
    if (stopped) break;
    const idx = seq[i];
    btns.forEach(b => b.classList.remove('playing'));
    btns[idx].classList.add('playing');
    setFreq(tones[idx]);
    playTone(tones[idx].freq, 0.38);
    setStatus(label + ' — ' + tones[idx].label + ' (' + tones[idx].freq.toFixed(1) + ' Hz)');
    prog.style.width = ((i + 1) / seq.length * 100) + '%';
    await new Promise(r => setTimeout(r, 450));
  }

  if (!stopped) {
    btns.forEach(b => b.classList.remove('playing'));
    animateWave(false);
    setFreq(null);
    prog.style.width = '0%';
    if (type === 'alien') {
      setJadoo('happy');
      setStatus('JADOO SAYS HELLO! SIGNAL RECEIVED FROM DEEP SPACE', false);
    } else {
      setJadoo('idle');
      setStatus('TRANSMISSION COMPLETE — AWAITING RESPONSE FROM DEEP SPACE', false);
    }
  }
}

function stopAll() {
  stopped = true;
  clearInterval(waveInterval);
  animateWave(false);
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('playing'));
  document.getElementById('progressBar').style.width = '0%';
  setFreq(null);
  setJadoo('idle');
  setStatus('TRANSMISSION ABORTED', false);
}

function buildGrid() {
  const grid = document.getElementById('toneGrid');
  tones.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tone-btn';
    btn.innerHTML =
      '<div class="tone-dot" style="background:' + t.color + ';box-shadow:0 0 6px ' + t.color + '"></div>' +
      '<div class="tone-name">' + t.label + '</div>' +
      '<div class="tone-hz">' + t.freq.toFixed(1) + ' Hz</div>';
    btn.addEventListener('click', e => handleBtn(i, e));
    grid.appendChild(btn);
  });
}

function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'left:' + Math.random() * 100 + '%;' +
      'top:' + Math.random() * 100 + '%;' +
      '--d:' + (Math.random() * 3 + 1.5) + 's;' +
      'animation-delay:' + Math.random() * 3 + 's;';
    container.appendChild(s);
  }
}

buildStars();
buildWaveform();
buildGrid();
</script>
</body>
</html>
